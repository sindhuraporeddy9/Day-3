<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Target Home</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-shell">
    <div th:replace="fragments/header :: header"></div>

    <main class="py-5">
        <div class="container px-4">
            <div class="row gy-4">
                <div class="col-lg-3">
                    <div class="sidebar-card rounded-4 shadow-sm p-4">
                        <h5>Categories</h5>
                        <ul class="list-unstyled mt-3">
                            <li th:each="category : ${categories}"><a th:text="${category}" class="text-decoration-none d-block py-2">Category</a></li>
                        </ul>
                    </div>
                </div>
                <div class="col-lg-9">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h2 class="section-title">All Products</h2>
                            <p class="text-muted mb-0">Browse the complete assortment of curated home, lifestyle, and tech favorites.</p>
                        </div>
                        <div class="text-end">
                            <span class="text-muted">Showing <strong th:text="${products.size()}">6</strong> products</span>
                        </div>
                    </div>
                    <div class="row g-4">
                        <div class="col-sm-6 col-xl-4" th:each="product : ${products}">
                            <div class="product-card rounded-4 shadow-sm overflow-hidden h-100">
                                <img th:src="${product.imageUrl}" alt="Product image" class="w-100 product-thumb" />
                                <div class="p-4 d-flex flex-column h-100 bg-white">
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <h5 class="product-name mb-0" th:text="${product.name}">Item name</h5>
                                        <span class="badge bg-danger" th:text="${product.category}">Category</span>
                                    </div>
                                    <p class="text-muted small mb-3" th:text="${product.description}">Product detail</p>
                                    <div class="mt-auto d-flex justify-content-between align-items-center">
                                        <span class="product-price">$<span th:text="${product.price}">49.99</span></span>
                                        <div class="d-flex gap-2">
                                            <a th:href="@{/product/{id}(id=${product.id})}" class="btn btn-link p-0 text-danger">Details</a>
                                            <a th:href="@{/cart/add/{id}(id=${product.id})}" class="btn btn-outline-danger btn-sm"><i class="fas fa-cart-plus"></i> Add</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
