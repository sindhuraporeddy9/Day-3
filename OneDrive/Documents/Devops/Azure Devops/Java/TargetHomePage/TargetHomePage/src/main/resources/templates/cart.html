<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Target Home</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-shell">
    <div th:replace="fragments/header :: header"></div>

    <main class="py-5">
        <div class="container px-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="section-title">Your Cart</h2>
                    <p class="text-muted mb-0">Review your selected items and prepare for checkout.</p>
                </div>
                <a href="/products" class="btn btn-danger">Continue Shopping</a>
            </div>
            <div class="card rounded-4 shadow-sm border-0 overflow-hidden">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Product</th>
                            <th class="text-center">Quantity</th>
                            <th class="text-end">Price</th>
                            <th class="text-end">Total</th>
                            <th class="text-end">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${cartItems}">
                            <td>
                                <div class="d-flex align-items-center gap-3">
                                    <img th:src="${item.product.imageUrl}" alt="Product" class="cart-thumb rounded-3" />
                                    <div>
                                        <h6 class="mb-1"><a th:href="@{/product/{id}(id=${item.product.id})}" class="text-decoration-none text-dark" th:text="${item.product.name}">Product</a></h6>
                                        <p class="mb-0 text-muted small" th:text="${item.product.category}">Category</p>
                                    </div>
                                </div>
                            </td>
                            <td class="text-center" th:text="${item.quantity}">1</td>
                            <td class="text-end">$<span th:text="${item.product.price}">129.99</span></td>
                            <td class="text-end">$<span th:text="${item.totalPrice}">259.98</span></td>
                            <td class="text-end">
                                <a th:href="@{/cart/remove/{id}(id=${item.product.id})}" class="btn btn-sm btn-outline-danger">Remove</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="mt-4 rounded-4 shadow-sm bg-white p-4 d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
                <div>
                    <h5 class="mb-1">Secure checkout in seconds</h5>
                    <p class="text-muted mb-0">Proceed with confidence and enjoy fast delivery options.</p>
                </div>
                <div class="text-end">
                    <div class="text-muted small mb-2">Estimated total</div>
                    <div class="h4 mb-0 text-dark">$<span th:text="${cartTotal}">0.00</span></div>
                </div>
                <a class="btn btn-danger btn-lg" href="#">Checkout Now</a>
            </div>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
