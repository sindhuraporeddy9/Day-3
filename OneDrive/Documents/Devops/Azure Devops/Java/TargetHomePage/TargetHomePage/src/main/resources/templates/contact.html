<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Target Home</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-shell">
    <div th:replace="fragments/header :: header"></div>

    <main class="py-5">
        <div class="container px-4">
            <div class="row gy-4">
                <div class="col-lg-6">
                    <h2 class="section-title">Get in touch</h2>
                    <p class="text-muted">Have a question about orders, products, or design guidance? Reach out to our team.</p>
                    <div class="contact-card rounded-4 shadow-sm p-4 bg-white">
                        <div class="mb-3">
                            <h6>Email</h6>
                            <p class="mb-0">support@targethome.com</p>
                        </div>
                        <div class="mb-3">
                            <h6>Phone</h6>
                            <p class="mb-0">(555) 123-4567</p>
                        </div>
                        <div>
                            <h6>Address</h6>
                            <p class="mb-0">125 Main Street, Minneapolis, MN 55401</p>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="card rounded-4 shadow-sm border-0 p-4 bg-white">
                        <h5>Send a message</h5>
                        <form class="mt-4">
                            <div class="mb-3">
                                <label class="form-label">Name</label>
                                <input type="text" class="form-control" placeholder="Your name">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" placeholder="Your email">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Message</label>
                                <textarea class="form-control" rows="5" placeholder="Tell us how we can help"></textarea>
                            </div>
                            <button type="submit" class="btn btn-danger">Submit</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
